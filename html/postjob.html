<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post a Job</title>
    <link rel="stylesheet" href="postjob.css">
</head>

<body>

    <div class="container">
        <header>
            <h1>Job Posting Portal</h1>
        </header>

        <section class="job-post-form">
            <h2>Post a Job Opportunity</h2>
            <form action="/submit-job" method="POST">
                <div class="form-group">
                    <label for="companyName">Company Name</label>
                    <input type="text" id="companyName" name="companyName" placeholder="Enter the company name"
                        required>
                </div>

                <div class="form-group">
                    <label for="jobProfile">Job Profile</label>
                    <input type="text" id="jobProfile" name="jobProfile" placeholder="Enter the job profile" required>
                </div>

                <div class="form-group">
                    <label for="location">Location</label>
                    <input type="text" id="location" name="location" placeholder="Enter the job location" required>
                </div>

                <div class="form-group">
                    <label for="stipend">Stipend/Salary</label>
                    <input type="number" id="stipend" name="stipend" placeholder="Enter the stipend or salary" required>
                </div>

                <div class="form-group">
                    <label for="deadline">Application Deadline</label>
                    <input type="date" id="deadline" name="deadline" required>
                </div>

                <div class="form-group">
                    <label for="jobType">Job Type</label>
                    <select id="jobType" name="jobType" required>
                        <option value="" disabled selected>Select job type</option>
                        <option value="fulltime">Full Time</option>
                        <option value="internship">Internship</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="jobRole">Job Role</label>
                    <textarea id="jobRole" name="jobRole" rows="5" placeholder="Describe the job role"
                        required></textarea>
                </div>

                <div class="form-group">
                    <label for="jobLink">Job Link</label>
                    <input type="url" id="jobLink" name="jobLink"
                        placeholder="Enter the URL for more details or application" required>
                </div>

                <div class="form-group">
                    <button type="submit">Post Job</button>
                </div>
            </form>
        </section>

        <footer>
            <p>&copy; 2024 Job Posting Portal</p>
        </footer>
    </div>

</body>

</html>
